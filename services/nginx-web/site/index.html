<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generic NGINX Demo</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      background: #eef5fb;
      color: #16324a;
    }
    main {
      max-width: 720px;
      margin: 10vh auto;
      padding: 2rem;
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(22, 50, 74, 0.16);
    }
    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Generic NGINX Demo</h1>
    <p>This site is served from <code>services/nginx-web/site/index.html</code>.</p>
    <p>Use it as a starter for static files, ingress tests, or a default landing page.</p>
  </main>
</body>
</html>
