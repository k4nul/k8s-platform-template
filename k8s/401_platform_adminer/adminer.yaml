apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: platform
  labels:
    app: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
      - name: adminer
        image: adminer:5.3.0-standalone
        imagePullPolicy: IfNotPresent
        env:
        - name: ADMINER_DEFAULT_SERVER
          value: __ADMINER_DEFAULT_SERVER__
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
