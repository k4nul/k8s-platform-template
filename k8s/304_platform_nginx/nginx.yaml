apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nginx
  namespace: platform
  labels:
    app: edge-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-nginx
  template:
    metadata:
      labels:
        app: edge-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.28-alpine
        imagePullPolicy: IfNotPresent
        env:
        - name: UPSTREAM_HOST
          value: nginx-web.platform.svc.cluster.local
        - name: UPSTREAM_PORT
          value: "80"
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/templates/default.conf.template
          subPath: default.conf.template
      volumes:
      - name: nginx-config
        configMap:
          name: edge-nginx-config
