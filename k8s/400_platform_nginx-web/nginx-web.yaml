apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: platform
  labels:
    app: nginx-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
      - name: nginx
        image: nginx:1.28-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: site-content
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: site-content
        configMap:
          name: nginx-web-content
