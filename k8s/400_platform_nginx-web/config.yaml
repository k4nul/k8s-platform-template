apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-web-content
  namespace: platform
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Generic NGINX Demo</title>
      <style>
        body {
          margin: 0;
          font-family: "Segoe UI", sans-serif;
          background: linear-gradient(135deg, #f7fbff 0%, #d9e9ff 100%);
          color: #15324b;
        }
        main {
          max-width: 720px;
          margin: 10vh auto;
          padding: 2rem;
          background: rgba(255, 255, 255, 0.9);
          border-radius: 20px;
          box-shadow: 0 24px 60px rgba(21, 50, 75, 0.16);
        }
        h1 {
          margin-top: 0;
          font-size: 2rem;
        }
        p {
          line-height: 1.6;
        }
        code {
          background: #edf5ff;
          padding: 0.2rem 0.4rem;
          border-radius: 6px;
        }
      </style>
    </head>
    <body>
      <main>
        <h1>NGINX Demo</h1>
        <p>__NGINX_WEB_MESSAGE__</p>
        <p>Edit <code>k8s/400_platform_nginx-web/config.yaml</code> or <code>services/nginx-web/site/index.html</code> to customize this example.</p>
      </main>
    </body>
    </html>
